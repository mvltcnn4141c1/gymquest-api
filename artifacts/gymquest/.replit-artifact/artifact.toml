kind = "mobile"
previewPath = "/"
title = "GymQuest - MMORPG Fitness"
version = "1.0.0"
id = "artifacts/gymquest"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24338

[services.development]
run = "pnpm --filter @workspace/gymquest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gymquest", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gymquest", "run", "serve" ]

[services.env]
PORT = "24338"
BASE_PATH = "/"
